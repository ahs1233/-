# بنية التطوير المحلية: PostgreSQL + MinIO (تخزين متوافق مع S3)
# التشغيل: docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: al-souq-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: souq
      POSTGRES_PASSWORD: souq
      POSTGRES_DB: al_souq
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U souq -d al_souq"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: al-souq-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
